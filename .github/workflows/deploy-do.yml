name: Build and deploy to DigitalOcean

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/rnoonegen/valmiki-server
  IMAGE_CLIENT: ghcr.io/rnoonegen/valmiki-client
  REACT_APP_SERVER_URL: http://139.59.6.209:5000
  # Must match the public site URL (CORS + Socket.IO). Change with your domain later.
  CLIENT_URL: http://139.59.6.209:4000

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:latest
            ${{ env.IMAGE_SERVER }}:${{ github.sha }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE_CLIENT }}:latest
            ${{ env.IMAGE_CLIENT }}:${{ github.sha }}
          build-args: |
            REACT_APP_SERVER_URL=${{ env.REACT_APP_SERVER_URL }}

      - name: Apply server-env Secret and restart workloads
        uses: appleboy/ssh-action@v1.2.0
        env:
          PORT: "5000"
          CLIENT_URL: ${{ env.CLIENT_URL }}
          MONGO_URI: "mongodb://mongo:27017/valmiki"
          MAX_UPLOAD_MB: "25"
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_SPACE_NAME: ${{ secrets.S3_SPACE_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_ACCESS_KEY_SECRET: ${{ secrets.S3_ACCESS_KEY_SECRET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: PORT,CLIENT_URL,MONGO_URI,MAX_UPLOAD_MB,ADMIN_JWT_SECRET,S3_REGION,S3_SPACE_NAME,S3_ACCESS_KEY_ID,S3_ACCESS_KEY_SECRET,S3_ENDPOINT,S3_PUBLIC_BASE_URL
          script: |
            set -e
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            JWT_VAL="${ADMIN_JWT_SECRET:-valmiki-admin-secret}"
            kubectl create secret generic server-env \
              --namespace valmiki \
              --dry-run=client \
              -o yaml \
              --from-literal=PORT="$PORT" \
              --from-literal=CLIENT_URL="$CLIENT_URL" \
              --from-literal=MONGO_URI="$MONGO_URI" \
              --from-literal=ADMIN_JWT_SECRET="$JWT_VAL" \
              --from-literal=MAX_UPLOAD_MB="$MAX_UPLOAD_MB" \
              --from-literal=S3_REGION="$S3_REGION" \
              --from-literal=S3_SPACE_NAME="$S3_SPACE_NAME" \
              --from-literal=S3_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID" \
              --from-literal=S3_ACCESS_KEY_SECRET="$S3_ACCESS_KEY_SECRET" \
              --from-literal=S3_ENDPOINT="$S3_ENDPOINT" \
              --from-literal=S3_PUBLIC_BASE_URL="$S3_PUBLIC_BASE_URL" \
              | kubectl apply -f -
            kubectl rollout restart deployment/server deployment/client -n valmiki
            kubectl rollout status deployment/server -n valmiki --timeout=120s
            kubectl rollout status deployment/client -n valmiki --timeout=120s

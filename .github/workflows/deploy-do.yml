name: Deploy with Docker Compose

on:
  push:
    branches: [main]

jobs:
  deploy-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on droplet via docker compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/rnoonegen/valmiki-ashram.git
          APP_DIR: /var/www/valmiki-ashram
          CLIENT_URL: http://139.59.6.209:4000
          REACT_APP_SERVER_URL: http://139.59.6.209:5000
          MONGO_URI: mongodb://mongo:27017/valmiki
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          MAX_UPLOAD_MB: "25"
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_SPACE_NAME: ${{ secrets.S3_SPACE_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_ACCESS_KEY_SECRET: ${{ secrets.S3_ACCESS_KEY_SECRET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: REPO_URL,APP_DIR,CLIENT_URL,REACT_APP_SERVER_URL,MONGO_URI,ADMIN_JWT_SECRET,MAX_UPLOAD_MB,S3_REGION,S3_SPACE_NAME,S3_ACCESS_KEY_ID,S3_ACCESS_KEY_SECRET,S3_ENDPOINT,S3_PUBLIC_BASE_URL
          script: |
            set -e

            mkdir -p /var/www
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            cat > .env.valmiki <<EOF
            CLIENT_URL=$CLIENT_URL
            REACT_APP_SERVER_URL=$REACT_APP_SERVER_URL
            MONGO_URI=$MONGO_URI
            ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-valmiki-admin-secret}
            MAX_UPLOAD_MB=$MAX_UPLOAD_MB
            S3_REGION=$S3_REGION
            S3_SPACE_NAME=$S3_SPACE_NAME
            S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID
            S3_ACCESS_KEY_SECRET=$S3_ACCESS_KEY_SECRET
            S3_ENDPOINT=$S3_ENDPOINT
            S3_PUBLIC_BASE_URL=$S3_PUBLIC_BASE_URL
            EOF

            docker compose --env-file .env.valmiki -f docker-compose.valmiki.yml up -d --build
            docker compose --env-file .env.valmiki -f docker-compose.valmiki.yml ps

name: Build and deploy to DigitalOcean

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/rnoonegen/valmiki-server
  IMAGE_CLIENT: ghcr.io/rnoonegen/valmiki-client
  REACT_APP_SERVER_URL: http://139.59.6.209

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:latest
            ${{ env.IMAGE_SERVER }}:${{ github.sha }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE_CLIENT }}:latest
            ${{ env.IMAGE_CLIENT }}:${{ github.sha }}
          build-args: |
            REACT_APP_SERVER_URL=${{ env.REACT_APP_SERVER_URL }}

      - name: Deploy on droplet (kubectl via SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/server deployment/client -n valmiki
            kubectl rollout status deployment/server -n valmiki --timeout=120s
            kubectl rollout status deployment/client -n valmiki --timeout=120s

apiVersion: v1
kind: Secret
metadata:
  name: server-env
  namespace: valmiki
type: Opaque
stringData:
  PORT: "5000"
  CLIENT_URL: "http://139.59.6.209"
  MONGO_URI: "mongodb://mongo.valmiki.svc.cluster.local:27017/valmiki"
  ADMIN_JWT_SECRET: "valmiki-admin-secret"
  MAX_UPLOAD_MB: "25"
  S3_REGION: ""
  S3_SPACE_NAME: ""
  S3_ACCESS_KEY_ID: ""
  S3_ACCESS_KEY_SECRET: ""
  S3_ENDPOINT: ""
  S3_PUBLIC_BASE_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: valmiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: ghcr.io/rnoonegen/valmiki-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: server-env
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: valmiki
spec:
  selector:
    app: server
  ports:
    - port: 5000
      targetPort: 5000

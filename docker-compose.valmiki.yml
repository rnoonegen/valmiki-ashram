services:
  mongo:
    image: mongo:7
    container_name: valmiki-mongo
    restart: unless-stopped
    volumes:
      - valmiki_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 15s
      timeout: 10s
      retries: 8

  server:
    build:
      context: ./server
    container_name: valmiki-server
    restart: unless-stopped
    environment:
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://139.59.6.209:4000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/valmiki}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-valmiki-admin-secret}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      S3_REGION: ${S3_REGION:-}
      S3_SPACE_NAME: ${S3_SPACE_NAME:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_ACCESS_KEY_SECRET: ${S3_ACCESS_KEY_SECRET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        REACT_APP_SERVER_URL: ${REACT_APP_SERVER_URL:-http://139.59.6.209:5000}
        REACT_APP_INTRO_VIDEO_URL: ${REACT_APP_INTRO_VIDEO_URL:-https://www.youtube.com/watch?v=vciPv_GGQ0E}
        REACT_APP_WHATSAPP_NUMBER: ${REACT_APP_WHATSAPP_NUMBER:-}
        REACT_APP_WHATSAPP_COMMUNITY_LINK: ${REACT_APP_WHATSAPP_COMMUNITY_LINK:-}
        REACT_APP_EMAIL: ${REACT_APP_EMAIL:-}
        REACT_APP_PHONE: ${REACT_APP_PHONE:-}
        REACT_APP_ADDRESS: ${REACT_APP_ADDRESS:-}
        REACT_APP_GOOGLE_MAPS_LINK: ${REACT_APP_GOOGLE_MAPS_LINK:-}
        REACT_APP_GOOGLE_MAPS_EMBED_URL: ${REACT_APP_GOOGLE_MAPS_EMBED_URL:-}
        REACT_APP_INSTAGRAM_LINK: ${REACT_APP_INSTAGRAM_LINK:-}
        REACT_APP_FACEBOOK_LINK: ${REACT_APP_FACEBOOK_LINK:-}
        REACT_APP_X_LINK: ${REACT_APP_X_LINK:-}
        REACT_APP_LINKEDIN_LINK: ${REACT_APP_LINKEDIN_LINK:-}
        REACT_APP_YOUTUBE_LINK: ${REACT_APP_YOUTUBE_LINK:-}
    container_name: valmiki-client
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - server

volumes:
  valmiki_mongo_data:
